<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        input { margin: 10px 0; }
        button { margin-top: 10px; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🔐 Admin Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="msg" style="color:red; margin-top:10px;"></div>
</div>
<script>
async function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) location.href = '/admin';
    else document.getElementById('msg').innerText = 'Invalid credentials';
}
</script>
</body>
</html>
